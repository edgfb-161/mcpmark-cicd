name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        id: eslint
        run: npm run lint
      - name: Run Prettier check
        id: prettier
        run: npx prettier --check .
      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintOutput = `${{ steps.eslint.outputs.stdout || steps.eslint.outputs.stderr }}`;
            const prettierOutput = `${{ steps.prettier.outputs.stdout || steps.prettier.outputs.stderr }}`;
            const comment = `## Code Quality Report
            ### ESLint Results
            \`\`\`
            ${eslintOutput || 'No ESLint issues found'}
            \`\`\`
            ### Prettier Results
            \`\`\`
            ${prettierOutput || 'All files formatted correctly'}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run tests with coverage
        id: test
        run: npm test -- --coverage
      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testOutput = `${{ steps.test.outputs.stdout || steps.test.outputs.stderr }}`;
            const comment = `## Test Coverage Report
            \`\`\`
            ${testOutput || 'Test coverage report not available'}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run dependency vulnerability check
        id: audit
        run: npm audit
      - name: Scan for secrets
        id: secrets
        run: npx git-secrets --scan
      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const auditOutput = `${{ steps.audit.outputs.stdout || steps.audit.outputs.stderr }}`;
            const secretsOutput = `${{ steps.secrets.outputs.stdout || steps.secrets.outputs.stderr }}`;
            const comment = `## Security Scan Report
            ### Vulnerabilities (Dependencies)
            \`\`\`
            ${auditOutput || 'No vulnerabilities found'}
            \`\`\`
            ### Secrets Scan
            \`\`\`
            ${secretsOutput || 'No secrets detected'}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build application
        id: build
        run: npm run build
      - name: Start application
        run: npm start &
      - name: Wait for server to start
        run: sleep 10
      - name: Validate endpoints
        id: endpoints
        run: |
          curl -f http://localhost:3000/health || exit 1
      - name: Create deployment preview artifacts
        run: tar -czf deployment-preview.tar.gz dist/
      - name: Post Build Validation
        uses: actions/github-script@v7
        with:
          script: |
            const buildOutput = `${{ steps.build.outputs.stdout || steps.build.outputs.stderr }}`;
            const endpointsOutput = `${{ steps.endpoints.outputs.stdout || steps.endpoints.outputs.stderr }}`;
            const comment = `## Build Validation
            ### Build Status
            \`\`\`
            ${buildOutput || 'Build completed successfully'}
            \`\`\`
            ### Endpoint Validation
            \`\`\`
            ${endpointsOutput || 'All endpoints accessible'}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      - name: Upload deployment preview
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: deployment-preview.tar.gz